---
services:
  scoreboard-redis:
    image: redis:8.6.1-trixie
    healthcheck:
      test:
      - CMD-SHELL
      - redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    ports:
      - mode: ingress
        target: 6379
        published: "${SCOREBOARD_REDIS_PORT}"
        protocol: tcp
      - mode: ingress
        target: 6379
        published: "${SCOREBOARD_REDIS_PORT}"
        protocol: udp
