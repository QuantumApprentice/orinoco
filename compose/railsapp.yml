---
services:
  railsapp:
    image: orinoco/railsapp
    ports:
      - "${ORINOCO_WEB_PORT}:3000"
    environment:
      - DATABASE_URL=${ORINOCO_DB_DATABASE_URL}
      - RAILS_ENV=test
      - RAILS_MAX_THREADS=5
      - RAILS_MIN_THREADS=5
      - SCOREBOARD_REDIS_URL=${SCOREBOARD_REDIS_URL}
      - EVENT_PIPELINE_GOAWS_URL=${EVENT_PIPELINE_GOAWS_URL}
    build:
      context: "./railsapp"
    depends_on:
      orinoco-db:
        condition: service_healthy
        restart: true
      scoreboard-redis:
        condition: service_healthy
        restart: true
